    <script src="https://cdnjs.cloudflare.com/ajax/libs/bluebird/3.7.2/bluebird.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fetch/3.6.20/fetch.min.js"></script>
    <script>
        var API_URL = "https://penguin.tail6139c3.ts.net";

        function getAuthHeaders() {
            var token = localStorage.getItem('authToken');
            return {
                "Authorization": "Bearer " + token
            };
        }

        function uploadFile() {
            var fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert("Please select a file first.");
                return;
            }
            var formData = new FormData();
            formData.append("file", fileInput.files[0]);

            fetch(API_URL + "/upload", { 
                method: "POST", 
                headers: getAuthHeaders(),
                body: formData 
            })
            .then(function (response) {
                if (response.ok) {
                    document.getElementById('status').innerText = "Upload success!";
                    loadFiles();
                } else {
                    document.getElementById('status').innerText = "Upload failed.";
                }
            })
            .catch(function () {
                document.getElementById('status').innerText = "Upload error.";
            });
        }

        function loadFiles() {
            var listElement = document.getElementById('fileList');
            listElement.innerHTML = "Loading...";

            fetch(API_URL + "/files", {
                headers: getAuthHeaders()
            })
            .then(function (response) {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(function (data) {
                listElement.innerHTML = ""; 
                
                if (!data.files || data.files.length === 0) {
                    listElement.innerHTML = "<li>No files found.</li>";
                    return;
                }

                data.files.forEach(function (filename) {
                    var li = document.createElement('li');
                    
                    var span = document.createElement('span');
                    span.innerText = filename;
                    li.appendChild(span);

                    var downloadBtn = document.createElement('button');
                    downloadBtn.innerText = "Download";
                    downloadBtn.onclick = function() {
                        downloadFile(filename);
                    };
                    li.appendChild(downloadBtn);
                    
                    listElement.appendChild(li);
                });
            })
            .catch(function () {
                listElement.innerHTML = "Error loading files. Ensure you are logged in.";
            });
        }

        function downloadFile(filename) {
            fetch(API_URL + '/download/' + encodeURIComponent(filename), { 
                headers: getAuthHeaders() 
            })
            .then(function(res) { 
                if (!res.ok) throw new Error();
                return res.blob(); 
            })
            .then(function(blob) {
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            })
            .catch(function() { 
                alert("Download failed."); 
            });
        }

        loadFiles();
    </script>
