<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stenoip Maps</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            
            padding: 10px;
           
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            width: 360px;
        }

        .search-container input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            padding: 5px;
        }

        .search-container button {
            background: rgb(0,255,0,211);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-container button:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search locations...">
        <button id="search-btn">Search</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
      
        var map;
        var currentMarker;
        var defaultLat = 40.7128; // Fallback to NYC if user denies location
        var defaultLon = -74.0060;

        // 1. Initialize map with a fallback view
        map = L.map('map').setView([defaultLat, defaultLon], 13);

        // 2. Add CartoDB Voyager Tile Layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Geolocation: Request User's Live Position
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    var userLat = position.coords.latitude;
                    var userLon = position.coords.longitude;

                    // Move map to user location
                    map.setView([userLat, userLon], 15);

                    // Add blue marker for user location
                    currentMarker = L.marker([userLat, userLon]).addTo(map);
                    currentMarker.bindPopup('<b>You are here!</b>').openPopup();
                }, 
                function(error) {
                    // Fallback marker if geolocation fails/is denied
                    currentMarker = L.marker([defaultLat, defaultLon]).addTo(map);
                    currentMarker.bindPopup('<b>Location access denied.</b><br>Showing default view.').openPopup();
                }
            );
        } else {
            // Browser doesn't support Geolocation
            currentMarker = L.marker([defaultLat, defaultLon]).addTo(map);
            currentMarker.bindPopup('Geolocation not supported by browser.').openPopup();
        }

        
        function searchLocation() {
            var query = document.getElementById('search-input').value;
            if (!query) return;

            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query);
            var xhr = new XMLHttpRequest();
            
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    
                    if (data && data.length > 0) {
                        var lat = parseFloat(data[0].lat);
                        var lon = parseFloat(data[0].lon);
                        var displayName = data[0].display_name;

                        map.setView([lat, lon], 14);

                        if (currentMarker) {
                            map.removeLayer(currentMarker);
                        }

                        currentMarker = L.marker([lat, lon]).addTo(map);
                        currentMarker.bindPopup('<b>' + query + '</b><br><span style="font-size:12px; color:gray;">' + displayName + '</span>').openPopup();
                    } else {
                        alert('Location not found!');
                    }
                }
            };
            xhr.send();
        }

        // 5. Event Listeners using standard ES5 functions
        document.getElementById('search-btn').addEventListener('click', searchLocation);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchLocation();
            }
        });
    </script>
</body>
</html>
