<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4433722838067397" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #fcfaf2; /* Newsprint color */
            --accent: #d32f2f;   /* Sensationalist red */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            font-family: "Georgia", serif;
            overflow: hidden;
        }

        /* Container for the swap effect */
        #content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Common styling for both states */
        .fade-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* News Link Styles (Yellow Journalism) */
        #rss-links {
            opacity: 1;
            z-index: 2;
        }

        #rss-links a {
            display: block;
            text-decoration: none;
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            margin-bottom: 12px;
            text-align: center;
            width: 90%;
            padding-bottom: 4px;
        }

        #rss-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Ad Layer Styles */
        #ad-layer {
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Utility classes for the fade */
        .hidden { opacity: 0 !important; pointer-events: none !important; }
        .visible { opacity: 1 !important; pointer-events: auto !important; }
    </style>
</head>
<body>

<div id="content-wrapper">
    <!-- NEWS LAYER -->
  
    <div id="rss-links" class="fade-layer">
        <p style="font-size: 0.7rem; letter-spacing: 2px; color: var(--red); margin: 0 0 10px 0;">WORLD EXCLUSIVE</p>
        <div id="inject-here" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            PRINTING LATEST NEWS...
        </div>
    </div>

    <!-- AD LAYER -->
    <div id="ad-layer" class="fade-layer">
        <ins class="adsbygoogle"
     style="display:inline-block;width:300px;height:250px"
     data-ad-client="ca-pub-4433722838067397"
     data-ad-slot="8016190618"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
    </div>

    <div style="display:none;">
    Latest global news reports, international relations, world economy updates, 
    and premium lifestyle journalism. High-quality editorial content for the 
    informed reader.
</div>
    
</div>

<script>
    function triggerCrossFade() {
        document.getElementById("rss-links").classList.add("hidden");
        document.getElementById("ad-layer").classList.add("visible");
    }

    async function loadRSS() {
        // Using HTTPS to prevent Load Errors
        const rssUrl = "https://feeds.bbci.co.uk/news/world/rss.xml";
        const target = document.getElementById("inject-here");

        try {
            const response = await fetch(
                `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`
            );
            const data = await response.json();

            if (!data.items || data.items.length === 0) {
                target.textContent = "THE PRESSES HAVE STALLED.";
                return;
            }

            target.innerHTML = "";
            data.items.slice(0, 3).forEach(item => {
                const link = document.createElement("a");
                link.href = "#";
                link.textContent = item.title;
                
                link.onclick = (e) => {
                    e.preventDefault();
                    triggerCrossFade();
                    window.open("https://stenoip.github.io/learn-centre", "_blank");
                };
                
                target.appendChild(link);
            });

            // AUTOMATIC FADE after 5 seconds
            setTimeout(() => {
                triggerCrossFade();
            }, 5000);

        } catch (e) {
            target.textContent = "COMMUNICATION LINE BROKEN.";
            console.error("News failed to load", e);
        }
    }

    loadRSS();
</script>

</body>
</html>
