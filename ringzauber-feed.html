<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4433722838067397" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #fcfaf2; /* Newsprint color */
            --accent: #d32f2f;   /* Sensationalist red */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            font-family: "Georgia", serif;
            overflow: hidden;
        }

        /* Container for the swap effect */
        #content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Common styling for both states */
        .fade-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* News Link Styles (Yellow Journalism) */
        #rss-links {
            opacity: 1;
            z-index: 2;
        }

        #rss-links a {
            display: block;
            text-decoration: none;
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            margin-bottom: 12px;
            text-align: center;
            width: 90%;
            padding-bottom: 4px;
        }

        #rss-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Ad Layer Styles */
        #ad-layer {
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Utility classes for the fade */
        .hidden { opacity: 0 !important; pointer-events: none !important; }
        .visible { opacity: 1 !important; pointer-events: auto !important; }
    </style>
</head>
<body>

<div id="content-wrapper">
    <!-- NEWS LAYER -->
    <div id="rss-links" class="fade-layer">
        <p style="font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); margin: 0 0 10px 0;">URGENT DISPATCH</p>
        <!-- Links injected here -->
    </div>

    <!-- AD LAYER -->
    <div id="ad-layer" class="fade-layer">
        <ins class="adsbygoogle"
     style="display:inline-block;width:300px;height:250px"
     data-ad-client="ca-pub-4433722838067397"
     data-ad-slot="8016190618"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
    </div>
</div>

<script>
    async function loadRSS() {
        const rssUrl = "http://feeds.bbci.co.uk/news/world/rss.xml";
        try {
            const response = await fetch(
                `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`
            );
            const data = await response.json();

            const container = document.getElementById("rss-links");
            
            if (!data.items || data.items.length === 0) {
                container.textContent = "THE PRESSES HAVE STALLED.";
                return;
            }

            // Slice first 3 as requested
            data.items.slice(0, 3).forEach(item => {
                const link = document.createElement("a");
                link.href = "#"; // Prevent default redirect to BBC
                link.textContent = item.title;
                
                link.onclick = (e) => {
                    e.preventDefault();
                    triggerCrossFade();
                    // Open the target site in a new tab
                    window.open("https://stenoip.github.io/learn-centre", "_blank");
                };
                
                container.appendChild(link);
            });
        } catch (e) {
            console.error("News failed to load");
        }
    }

    function triggerCrossFade() {
        const news = document.getElementById("rss-links");
        const ads = document.getElementById("ad-layer");

        news.classList.add("hidden");
        ads.classList.add("visible");

        // Optional: Reset back to news after 30 seconds
        setTimeout(() => {
            ads.classList.remove("visible");
            news.classList.remove("hidden");
        }, 30000);
    }

    loadRSS();
</script>

</body>
</html>
